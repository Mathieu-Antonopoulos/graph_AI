<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Spectral Cheeger Demo</title>

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/spectral.css">

<script src="js/toolbox/toolbox.bundle.js"></script>

<script src="js/d3.v7.min.js"></script>
<script src="js/message.js"></script>
<script src="js/interface.js"></script>

<script src="js/spectral_app.js"></script>
<script>
window.MathJax = {
  tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>

    <main>

    <h1 class="title">Cheeger Inequality Demo</h1>

    <div class="controls">
        <label>Bridge weight</label>
        <input id="weight-slider" type="range" min="0" max="1" step="0.01">
        <span id="weight-value">0</span>
    </div>

    <div class="grid">

        <div class="panel">
            <h2>Graph</h2>
            <div id="graph"></div>
        </div>
<!-- 
        <div class="panel">
            <h2>Spectral Embedding (v₂,v₃)</h2>
            <div id="embedding"></div>
        </div> -->

        <div class="panel">
            <h2>Laplacian Eigenvalues</h2>
            <div id="eigenvalues"></div>
        </div>

        <div class="panel">
            <h3>Eigenvectors</h3>
            <div id="eigenvectors"></div>
        </div>

        <div class="panel">
            <h3>Eigenvector Heatmap</h3>
            <div id="eigenvector-heatmap"></div>
        </div>

        <div class="panel cheeger-panel">
            <h3>Cheeger Sweep</h3>

            <div id="cheeger-formula">
                <div class="cheeger-box" id="cheeger-def"></div>
                <div class="cheeger-box" id="cheeger-set"></div>
                <div class="cheeger-box" id="cheeger-terms"></div>
                <div class="cheeger-result" id="cheeger-result"></div>
            </div>

            <input type="range" id="cheeger-slider">

            <div id="cheeger-charts">
                <svg id="cheeger-graph" width="320" height="240"></svg>
                <svg id="cheeger-curve" width="320" height="200"></svg>
            </div>
        </div>

    </div>

    <div class="theory">

    <b>Key property</b>

    <div id="cheeger-text"></div>

    </div>

    </main>

<script>

async function __init__(){

    await wait_for_socket_ready()

    init_app()

}

__init__()

</script>

</body>
</html>
